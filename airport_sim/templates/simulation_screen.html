<!DOCTYPE html>
<html>
<head>
  <title>Window Screen</title>
  <link rel="stylesheet" href="static/css/simulation_screen.css">
</head>

<body>

 <div class="timer">DD:HH:MM</div>

  <div class="holding-pattern-queue">
    <div class="holding-pattern-plane-wrapper"></div>  
    <div class="holding-pattern-title">HOLDING PATTERN Q</div>  
  </div>

  <div class="take-off-queue">
    <div class="take-off-plane-wrapper"></div>  
    <div class="take-off-title">TAKE-OFF Q</div>  
  </div>

  <div id="container"></div>

 <div class="display-info-screen">
    Aircraft 88 Info:
    <ul>
      <li>Plane B123</li>
      <li>Landing in 5 min</li>
      <li>Gate 4</li>
      <li>Gate 4</li>     
      <li>Plane B123</li>
      <li>Landing in 5 min</li>
      <li>Gate 4</li>
      <li>Gate 4</li>
    </ul>
  </div>  

  <div class="controls-guide">
    <div class="control-row">
      <span class="key-icon">&#9664;</span>
      <span class="control-label">Slow Down</span>
    </div>
    <div class="control-row">
      <span class="key-icon">&#9654;</span>
      <span class="control-label">Speed Up</span>
    </div>
    <div class="control-row">
      <span class="key-icon space-key">━━</span>
      <span class="control-label">Pause</span>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script src="static/js/simulation_screen.js"> </script>

</body>
</html>
