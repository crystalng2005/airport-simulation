<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Simulation Result - Airport Simulation</title>
    <link rel="stylesheet" href="static/css/results.css">
</head>
<body>
    <!-- Main Content -->
    <main class="results-section">      

        <!-- Results Table -->
        <div id="resultsContainer" class="results-container" style="display: none;">
            <table class="results-table">
                <thead>
                    <tr>
                        <th width="50">Select</th>
                        <th width="80">Sim #</th>
                        <th width="150">Date & Time</th>
                        <th width="100">Duration</th>
                        <th width="80">Runways</th>
                        <th width="100">Total Planes</th>
                        <th width="90">Diversions</th>
                        <th width="100">Cancellations</th>
                        <th width="90">Max Queue</th>
                        <th width="150">Actions</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                    <!-- Results will be inserted here -->
                </tbody>
            </table>
        </div>

        <!-- View Report Modal -->
        <div id="reportModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Simulation Report</h2>
                </div>
                <div class="comparison-view-switch" style="padding: 10px 20px 0;">
                    <button id="reportResultsBtn" class="btn btn-primary" onclick="showReportResults()">View Results</button>
                    <button id="reportPlotsBtn" class="btn btn-secondary" onclick="showReportPlots()">View Plots</button>
                </div>
                <div class="modal-body" style="padding: 15px 20px; overflow-y: auto;">
                    <div id="reportContent" style="display: block;">
                        <!-- Report metrics will be inserted here -->
                    </div>
                    <div id="plotsSection" style="display: none; margin-top: 15px;">
                        <h3 style="color: #1e3a8a; margin: 0 0 10px; font-size: 1rem;">Performance Plots</h3>
                        <div id="plotsContainer" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px;">
                            <!-- Plot images will be inserted here -->
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="padding: 10px 20px;">
                    <div class="tooltip-wrapper">
                        <button class="btn btn-export" onclick="exportCurrentReport()" aria-describedby="exportTooltip">Export Report</button>
                        <span id="exportTooltip" class="tooltip-text" role="tooltip">Export for More Details</span>
                    </div>
                    <button class="btn btn-secondary" onclick="goToMenu()">Close</button>
                </div>
            </div>
        </div>
    </main>
    <script src="static/js/result_screen.js"></script>
</body>
</html>
