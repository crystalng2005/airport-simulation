
# Pytest Configuration File


[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directory to start test discovery
testpaths = tests

# Add project root to Python path
pythonpath = .

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# Minimum Python version
minversion = 3.7

# Test markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    smoke: Quick smoke tests for basic functionality
    slow: Tests that take a long time to run
    flask: Tests for Flask routes and web interface
    logic: Tests for core simulation logic
    queue: Tests for queue management
    runway: Tests for runway logic
    plane: Tests for plane/aircraft logic
    preset: Tests for preset functionality
    
# Console output format
console_output_style = progress

# Show extra test summary info
verbose = 1